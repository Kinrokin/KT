name: FL3 PR Fast
on:
  pull_request:

jobs:
  fl3-pr-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Fail-closed governance tests require pinned tags/commits to be resolvable.
          # Shallow clones can omit tags and pinned historical commits.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run FL3 tests (fast)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: python -m pytest -q -o addopts='' KT_PROD_CLEANROOM/tests/fl3
      - name: FL3 meta-evaluator (law)
        env:
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: python -m tools.verification.fl3_meta_evaluator
      - name: Validate archive receipts
        env:
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: |
          set -euo pipefail
          if [ -d KT_ARCHIVE/vault/receipts ]; then
            python -m tools.verification.validate_receipts --receipts-dir KT_ARCHIVE/vault/receipts --out-dir tmp/receipt_validation
          else
            echo "SKIP: KT_ARCHIVE/vault/receipts is not present on the active canonical tree"
          fi
      - name: Run Temple V2 tests (smoke)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: python -m pytest -q -o addopts='' KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/tests
