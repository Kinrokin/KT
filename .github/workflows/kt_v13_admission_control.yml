name: KT V13 Admission Control

on:
  pull_request:
    paths:
      - "accountability/**"
      - "packets/ktg3full_v13/**"
      - "packets/ktg3full_v13.zip"
      - "reports/v12_*"
      - "reports/v13_*"
      - "reports/no_scaffold_runtime_gate_receipt.json"
      - "reports/hat_utility_under_constraint_scorecard.json"
      - "schemas/kt.v12_*"
      - "schemas/kt.specialist_route_derivation_receipt.schema.json"
      - "schemas/kt.no_scaffold_runtime_gate.schema.json"
      - "schemas/kt.hat_utility_under_constraint.schema.json"
      - "scripts/*v12*.py"
      - "scripts/*v13*.py"
      - "scripts/*specialist_router*.py"
      - "scripts/enforce_no_scaffold_runtime_gate.py"
      - "tests/test_v12_*.py"
      - "tests/test_v13_*.py"
      - "tests/test_no_scaffold_runtime_gate.py"
      - "tests/test_hat_utility_under_constraint.py"
  push:
    branches:
      - main

jobs:
  v13-admission-control:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run V13 focused tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest -q \
            tests/test_v12_evidence_import.py \
            tests/test_v12_specialist_route_derivation.py \
            tests/test_v13_admission_control.py \
            tests/test_no_scaffold_runtime_gate.py \
            tests/test_hat_utility_under_constraint.py \
            tests/test_v13_packet_generation.py \
            tests/test_v13_dci_repo_state_diff.py
