name: EPIC_16 Governance Smoke
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  epic16-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: EPIC_16 unit tests (admission + counter-pressure)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: |
          python -m pytest -q KT_PROD_CLEANROOM/tests/fl3/test_epic16_admission_gates.py KT_PROD_CLEANROOM/tests/fl3/test_epic16_schemas.py
          python -m pytest -q KT_PROD_CLEANROOM/tests/fl3/test_epic15_tournament_runner.py KT_PROD_CLEANROOM/tests/fl3/test_epic15_merge_evaluator.py
      - name: FL3 meta-evaluator (law)
        env:
          PYTHONPATH: KT_PROD_CLEANROOM/04_PROD_TEMPLE_V2/src:KT_PROD_CLEANROOM
        run: python -m tools.verification.fl3_meta_evaluator

