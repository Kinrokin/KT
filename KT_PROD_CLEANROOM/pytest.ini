[pytest]
minversion = 9.0
addopts = -ra --strict-config --strict-markers --cov=KT_PROD_CLEANROOM --cov-report=term-missing
testpaths =
    tests
    04_PROD_TEMPLE_V2/tests
    04_PROD_TEMPLE_V2/src
    tools
python_files = test_*.py
markers =
    fl3: FL3 closure and policy tests.
    operator: Operator and validator tests.
    policy_c: Policy C sweep and drift tests.
    runtime: Runtime and temple-organ tests.
